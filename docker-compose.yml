services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USERNAME:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypass}
      POSTGRES_DB: ${DB_NAME:-mydb}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
