<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Living - Dashboard</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Patient breakdown</h1>
  <canvas id="breakdown" width="400" height="200"></canvas>
  <script th:inline="javascript">
    const invitedPatients = [[${invitedPatients}]];
    const registeredPatients = [[${registeredPatients}]];
    const dischargedPatients = [[${dischargedPatients}]];
    const ctx = document.getElementById('breakdown').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Invited Patients','Registered Patients','Discharged Patients'],
        datasets: [{
          label: 'Patients',
          backgroundColor: ['#36a2eb','#4bc0c0','#ff6384'],
          data: [invitedPatients, registeredPatients, dischargedPatients]
        }]
      }
    });
  </script>
  <p><a th:href="@{/patients}">View patients</a></p>
</body>
</html>
