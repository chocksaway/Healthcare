spring.application.name=Healthcare

spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:mydb}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:mypass}
spring.datasource.driver-class-name=org.postgresql.Driver

# include thread and logger
logging.pattern.level=%5p [%X{cid}] [%t] %c


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true

spring.thymeleaf.cache=false
server.port=8080
logging.level.org.hibernate.SQL=DEBUG
